name: Test Slack Notification

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-deployment:
    runs-on: ubuntu-latest
    
    steps:
    
      # 🟦 START NOTIFICATION 
      - name: Slack Notification - Deployment Started
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "Deployment started 🚀 for ${{ github.repository }} on branch `develop`"}

      
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Step 1 - Setup
        run: |
          echo "Setting up environment..."
          sleep 2
        # exit 1
      
      - name: Step 2 - Build
        run: |
          echo "Building application..."
          sleep 2
      
      - name: Step 3 - Test
        run: |
          echo "Running tests..."
          sleep 2
      
      - name: Step 4 - Deploy
        run: |
          echo "Deploying application..."
          echo "Deployment completed successfully!"
          sleep 2

      - name: Slack Notification - Deployment Result
        if: always()
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Deployment ${{ job.status }} ${{ job.status == 'success' && '✅' || job.status == 'failure' && '❌' || '⚠️' }} for ${{ github.repository }}",
              "attachments": [
                {
                  "color": "${{ job.status == 'success' && '#3D9BF0' || job.status == 'failure' && '#FF6B35' || '#9B59B6' }}",
                  "blocks": [
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Deployment Status:* `${{ job.status }}` ${{ job.status == 'success' && '✅' || job.status == 'failure' && '❌' || '⚠️' }}\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                      }
                    }
                  ]
                }
              ]
            }
